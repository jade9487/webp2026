<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW#4 景點觀光展覽資訊（搜尋+分頁）</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
          crossorigin="anonymous">
    
    <style>
        body { padding: 30px; }
        h1 { color: #0d6efd; }
        #searchInput { max-width: 500px; }
        table { font-size: 1.1rem; }
    </style>
</head>
<body class="container">

    <h1 class="text-center mb-4">🏛️ 景點觀光展覽資訊（HW#4）</h1>
    
    <!-- 搜尋框 -->
    <div class="text-center mb-4">
        <input type="text" id="searchInput" class="form-control" 
               placeholder="🔍 輸入展覽名稱關鍵字搜尋（例如：台灣、科博館）" 
               oninput="handleSearch()">
    </div>

    <!-- 表格 -->
    <table id="myTable" class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>名稱</th>
                <th>地點</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- 分頁控制 -->
    <div class="text-center mt-3">
        <button id="prevBtn" onclick="prevPage()" class="btn btn-secondary me-3">⬅️ 上一頁</button>
        <span id="pageInfo" class="fs-5 fw-bold">1 / 1 頁</span>
        <button id="nextBtn" onclick="nextPage()" class="btn btn-secondary ms-3">下一頁 ➡️</button>
    </div>

    <script>
        let allData = [];          // 儲存所有原始資料
        let currentPage = 1;       // 目前頁碼
        const itemsPerPage = 10;   // 每頁 10 筆
        let searchKeyword = '';    // 目前搜尋關鍵字

        // 抓取 API 資料
        function fetchData() {
            const openUrl = "https://cloud.culture.tw/frontsite/trans/SearchShowAction.do?method=doFindTypeJ&category=6";
            const xhr = new XMLHttpRequest();
            xhr.open('GET', openUrl, true);
            
            xhr.onload = function () {
                if (xhr.status === 200) {
                    allData = JSON.parse(xhr.responseText);
                    currentPage = 1;
                    searchKeyword = '';
                    document.getElementById('searchInput').value = '';
                    renderTable();
                    console.log('✅ HW#4 Ajax 成功載入 ' + allData.length + ' 筆展覽資料');
                }
            };
            xhr.send();
        }

        // 取得過濾後的資料（只搜名稱）
        function getFilteredData() {
            if (!searchKeyword) return [...allData];
            
            const lowerKey = searchKeyword.toLowerCase();
            return allData.filter(item => 
                item.title && item.title.toLowerCase().includes(lowerKey)
            );
        }

        // 渲染表格 + 分頁資訊
        function renderTable() {
            const filtered = getFilteredData();
            const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
            
            // 避免頁碼超過總頁數
            if (currentPage > totalPages) currentPage = totalPages;
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = filtered.slice(start, end);

            // 清空表格
            const tbody = document.querySelector('#myTable tbody');
            tbody.innerHTML = '';

            pageData.forEach(data => {
                const row = tbody.insertRow();
                
                // 名稱
                row.insertCell(0).innerHTML = data.title || '（無標題）';
                
                // 地點
                let location = '（無地點資訊）';
                if (data.showInfo && data.showInfo[0] && data.showInfo[0].location) {
                    location = data.showInfo[0].location;
                }
                row.insertCell(1).innerHTML = location;
            });

            // 更新分頁資訊
            const pageInfo = document.getElementById('pageInfo');
            pageInfo.innerHTML = `
                第 <strong>${currentPage}</strong> 頁 / 共 <strong>${totalPages}</strong> 頁 
                <span class="text-muted">（${filtered.length} 筆符合）</span>
            `;

            // 控制按鈕
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }

        // 上一頁
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }

        // 下一頁
        function nextPage() {
            const filtered = getFilteredData();
            const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        }

        // 搜尋（oninput 即時搜尋，更好用）
        function handleSearch() {
            searchKeyword = document.getElementById('searchInput').value.trim();
            currentPage = 1;        // 搜尋後回到第 1 頁
            renderTable();
        }

        // 頁面載入時自動執行
        window.onload = fetchData;
    </script>
</body>
</html>
