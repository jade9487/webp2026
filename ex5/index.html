<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex#5 按鈕生成和刪除</title>
    
    <!-- Bootstrap CSS（講義使用的版本） -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
          crossorigin="anonymous">
</head>
<body class="container mt-5">

    <h5>Click the button to make a BUTTON element with text.</h5>
    
    <!-- 兩個固定控制按鈕 -->
    <button onclick="addfunction()" class="btn btn-outline-primary me-2">Add it</button>
    <button onclick="delfunction()" class="btn btn-outline-primary">Del it</button>

    <!-- 動態產生的按鈕會自動加在 body 最後面 -->
    <script src="script.js"></script>
</body>
</html>
