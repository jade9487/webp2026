<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab09 Flickr Photo Wall</title>

<style>
body{
    margin:0;
    padding:30px;
    font-family:Arial, Helvetica, sans-serif;
    background:#f2f2f2;
    text-align:center;
}

h1{
    margin-bottom:20px;
}

button{
    padding:12px 28px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    cursor:pointer;
    margin-bottom:25px;
}

button:hover{
    background:#555;
}

.gallery{
    --g:6px;

    display:grid;
    width:1200px;
    max-width:100%;
    margin:auto;
    aspect-ratio:1;
    grid:auto-flow 1fr / repeat(3,1fr);
    gap:var(--g);
}

.gallery img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:grayscale(100%);
    cursor:pointer;
    transition:.5s;
}

.gallery img:hover{
    filter:grayscale(0%);
}

.gallery img:nth-child(2){
    grid-area:1/2/span 2/span 2;
    clip-path: polygon(
        0 0,
        100% 0,
        100% 100%,
        calc(50% + var(--g)/4) 100%,
        0 calc(50% - var(--g)/4)
    );
}

.gallery img:nth-child(3){
    grid-area:2/1/span 2/span 2;
    clip-path: polygon(
        0 0,
        calc(50% - var(--g)/4) 0,
        100% calc(50% + var(--g)/4),
        100% 100%,
        0 100%
    );
}
</style>
</head>

<body>

<h1>Lab09 Flickr Photo Wall</h1>

<button onclick="getimg()">Get IMG</button>

<div id="gallery" class="gallery"></div>

<script src="script.js"></script>

</body>
</html>
