<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資工系課表練習</title>
    <style>
        /* 表格整體樣式 */
        table {
            width: 80%;
            margin: 20px 0;
            border-collapse: separate; /* 注意：要實現圓角，這裡改用 separate */
            border-spacing: 0;         /* 消除單元格間距 */
            border: 1px solid #ddd;
            border-radius: 15px;       /* 這裡設定橢圓邊緣的弧度 */
            overflow: hidden;          /* 確保內部的背景色不會超出圓角邊框 */
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* 加一點陰影讓質感更好 */
        }

        /* 表頭樣式 */
        th {
            background-color: #04AA6D; /* 綠色背景 */
            color: white;
            padding: 15px;
            text-align: left;
            font-size: 16px;
        }

        /* 單元格樣式 */
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
            color: #333;
        }

        /* 最後一列不顯示底線，避免影響圓角視覺 */
        tr:last-child td {
            border-bottom: none;
        }

        /* 滑鼠滑過行時的變色效果 */
        tr:hover {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <h2>課表資料查詢</h2>

    <table>
        <thead>
            <tr>
                <th>開課單位</th>
                <th>課程名稱</th>
                <th>授課老師</th>
            </tr>
        </thead>
        <tbody>
        <tr>
            <td>資工系</td>
            <td>物件導向軟體設計</td>
            <td>黃崇源</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td>計算機網路實驗</td>
            <td>李春良</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td>作業系統實務</td>
            <td>張哲維</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td>生物統計</td>
            <td>陳光武</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td>通訊系統</td>
            <td>陳仁輝</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td>軟硬體專體(2)</td>
            <td>魏志達</td>
        </tr>
    </tbody>

</body>
</html>
