<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex#7 簡單打字機</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
          crossorigin="anonymous">
    
    <style>
        #container {
            font-family: monospace;
            font-size: 2.5rem;
            letter-spacing: 8px;
            min-height: 120px;
            background: #f8f9fa;
            border: 3px dashed #0d6efd;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body class="container mt-5">

    <h3 class="text-center mb-4">🐔 簡單的打字機（Typing Tutor）</h3>
    <div id="container" tabindex="0" class="text-center"></div>
    
    <p class="text-center mt-3 text-muted">
        按鍵盤輸入字母，匹配最左邊的字就會被消除！<br>
        每次輸入後會自動補充新字母
    </p>

    <script src="script.js"></script>
</body>
</html>
