<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資工系課表 - Iframe AJAX 整合版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; padding: 20px; font-family: "Microsoft JhengHei", sans-serif; }
        .container { max-width: 1000px; }

        /* 1. 嚴格要求：綠色為底的 th */
        .main-table {
            width: 100%; border-collapse: separate; border-spacing: 0;
            border: 1px solid #ddd; border-radius: 15px; overflow: hidden;
            background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .main-table th { 
            background-color: #04AA6D !important; /* 綠色底 */
            color: white !important; 
            padding: 15px; 
            text-align: center;
        }
        .main-table td { padding: 15px; border-bottom: 1px solid #ddd; text-align: center; }
        
        .course-link { color: #04AA6D; text-decoration: underline; cursor: pointer; font-weight: bold; }

        /* 2. Iframe 顯示區域 (包住新的網頁) */
        #iframe-container {
            display: none;
            background: white;
            border: 1px solid #ddd;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-top: 20px;
        }
        
        /* 設定內嵌網頁的高度 */
        #course-iframe {
            width: 100%;
            height: 600px;
            border: none;
        }

        /* 3. 下方 Change 按鈕樣式 */
        .btn-change-style {
            background-color: #04AA6D; color: white; border: none;
            padding: 10px 45px; border-radius: 25px; font-weight: bold; transition: 0.3s;
        }
        .btn-change-style:hover { background-color: #038554; }

        .iframe-header {
            background-color: #f8f9fa;
            padding: 10px 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container" id="app-root">
    
    <div id="view-index">
        <h2 class="text-center mb-4">資工系課表查詢 (Iframe 內嵌技術)</h2>
        <table class="main-table">
            <thead>
                <tr>
                    <th>開課單位</th>
                    <th>課程名稱 (點擊內嵌顯示)</th>
                    <th>授課老師</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>資工系</td>
                    <td><span class="course-link" onclick="openIframe('A2337')">物件導向軟體設計</span></td>
                    <td id="target-teacher">黃崇源</td>
                </tr>
                <tr>
                    <td>資工系</td>
                    <td><span class="course-link" onclick="openIframe('A2340')">計算機網路實驗</span></td>
                    <td>李春良</td>
                </tr>
                <tr>
                    <td>資工系</td>
                    <td><span class="course-link" onclick="openIframe('A2336')">作業系統實務</span></td>
                    <td>張哲維</td>
                </tr>
                <tr>
                    <td>資工系</td>
                    <td><span class="course-link" onclick="openIframe('A2346')">生物統計</span></td>
                    <td>陳光武</td>
                </tr>
                <tr>
                    <td>資工系</td>
                    <td><span class="course-link" onclick="openIframe('A2338')">通訊系統</span></td>
                    <td>陳仁輝</td>
                </tr>
                <tr>
                    <td>資工系</td>
                    <td><span class="course-link" onclick="openIframe('A2339')">軟硬體專題(2)</span></td>
                    <td>魏志達</td>
                </tr>
            </tbody>
        </table>

        <div class="text-center mt-4">
            <button class="btn-change-style" onclick="changeTeacherName()">Change</button>
        </div>
    </div>

    <div id="iframe-container">
        <div class="iframe-header">
            <span class="fw-bold"><i class="bi bi-browser-safari"></i> 外部課程大綱系統</span>
            <button class="btn-close" onclick="closeIframe()"></button>
        </div>
        <iframe id="course-iframe" src=""></iframe>
        <div class="p-3 text-center border-top">
            <button class="btn-change-style" onclick="closeIframe()">返回課表</button>
        </div>
    </div>

</div>

<script>
    // 1. Iframe 控制功能 (AJAX 局部換頁感)
    function openIframe(sectionId) {
        const baseUrl = "https://catalog.cgu.edu.tw/coursedata?sectionid=";
        const iframe = document.getElementById('course-iframe');
        const container = document.getElementById('iframe-container');
        const indexView = document.getElementById('view-index');

        // 設定 iframe 的 src 為外部網站連結
        iframe.src = baseUrl + sectionId;

        // 切換顯示 (不刷新網頁)
        indexView.style.display = 'none';
        container.style.display = 'block';
    }

    function closeIframe() {
        document.getElementById('view-index').style.display = 'block';
        document.getElementById('iframe-container').style.display = 'none';
        document.getElementById('course-iframe').src = ""; // 清空 src
    }

    // 2. Change 按鈕功能：點一下第一格指導教授變成李春良
    function changeTeacherName() {
        const teacherCell = document.getElementById('target-teacher');
        teacherCell.innerText = "李春良";
        teacherCell.style.color = "blue";
        teacherCell.style.fontWeight = "bold";
        alert("已執行 Change：第一格老師姓名已修改。");
    }
</script>

</body>
</html>
